<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>Color Tracker</title>

<style>
body {
  font-family: sans-serif;
  margin: 20px;
  background: #FFFDF8;
}

.page {
  display: none;
}

.page.active {
  display: block;
}

.row {
  display: flex;
  align-items: center;
  margin-bottom: 18px;
}

.color {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  margin-right: 14px;
  flex-shrink: 0;
}

input {
  border: none;
  border-bottom: 1px solid #C9D3E0;
  outline: none;
  flex: 1;
  padding: 6px 4px;
  background: transparent;
}

input:focus {
  border-bottom: 2px solid #4A6CF7;
}

button {
  margin-bottom: 15px;
  padding: 8px 12px;
  cursor: pointer;
  background: white;
  border: 1px solid #ddd;
  border-radius: 8px;
}
</style>
</head>

<body>

<button onclick="show(1)">Page 1</button>
<button onclick="show(2)">Page 2</button>

<!-- PAGE 1 -->
<div id="p1" class="page active">

  <div class="row"><div class="color" style="background:#DC143C"></div><input placeholder="#DC143C" /></div>
  <div class="row"><div class="color" style="background:#F75270"></div><input placeholder="#F75270" /></div>
  <div class="row"><div class="color" style="background:#F7CAC9"></div><input placeholder="#F7CAC9" /></div>
  <div class="row"><div class="color" style="background:#DD7BDF"></div><input placeholder="#DD7BDF" /></div>
  <div class="row"><div class="color" style="background:#FF653F"></div><input placeholder="#FF653F" /></div>
  <div class="row"><div class="color" style="background:#FFA02E"></div><input placeholder="#FFA02E" /></div>
  <div class="row"><div class="color" style="background:#FFC81E"></div><input placeholder="#FFC81E" /></div>
  <div class="row"><div class="color" style="background:#FFD6A6"></div><input placeholder="#FFD6A6" /></div>
  <div class="row"><div class="color" style="background:#4300FF"></div><input placeholder="#4300FF" /></div>
  <div class="row"><div class="color" style="background:#0065F8"></div><input placeholder="#0065F8" /></div>

</div>

<!-- PAGE 2 -->
<div id="p2" class="page">

  <div class="row"><div class="color" style="background:#00CAFF"></div><input placeholder="#00CAFF" /></div>
  <div class="row"><div class="color" style="background:#00FFDE"></div><input placeholder="#00FFDE" /></div>
  <div class="row"><div class="color" style="background:#1F6F5F"></div><input placeholder="#1F6F5F" /></div>
  <div class="row"><div class="color" style="background:#2FA084"></div><input placeholder="#2FA084" /></div>
  <div class="row"><div class="color" style="background:#6FCF97"></div><input placeholder="#6FCF97" /></div>
  <div class="row"><div class="color" style="background:#9AD872"></div><input placeholder="#9AD872" /></div>
  <div class="row"><div class="color" style="background:#091413"></div><input placeholder="#091413" /></div>
  <div class="row"><div class="color" style="background:#854836"></div><input placeholder="#854836" /></div>
  <div class="row"><div class="color" style="background:#758A93"></div><input placeholder="#758A93" /></div>
  <div class="row"><div class="color" style="background:#BFC9D1"></div><input placeholder="#BFC9D1" /></div>

</div>

<script>
function show(n) {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.getElementById("p" + n).classList.add("active");
}
</script>

</body>
</html>
