<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>Color Tracker</title>

<style>
body {
  font-family: sans-serif;
  margin: 20px;
  background: #FFFDF8;
}

/* NAV */
.nav {
  display: flex;
  justify-content: flex-start;
  align-items: center;
  gap: 8px;
  margin-bottom: 15px;
}

.nav button {
  border: none;
  background: #f5f1e8;
  padding: 6px 10px;
  border-radius: 10px;
  cursor: pointer;
  font-size: 16px;
}

/* PAGE */
.page {
  display: none;
}
.page.active {
  display: block;
}

.row {
  display: flex;
  align-items: center;
  margin-bottom: 18px;
}

.color {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  margin-right: 14px;
  flex-shrink: 0;
}

input {
  border: none;
  border-bottom: 1px solid #C9D3E0;
  outline: none;
  flex: 1;
  padding: 6px 4px;
  background: transparent;
}

input:focus {
  border-bottom: 2px solid #4A6CF7;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <button onclick="show(-1)">◀</button>
  <button onclick="show(1)">▶</button>
</div>

<!-- PAGE 1 -->
<div id="p1" class="page active">
  <div class="row"><div class="color" style="background:#DC143C"></div><input data-key="#DC143C" placeholder="#DC143C" /></div>
  <div class="row"><div class="color" style="background:#F75270"></div><input data-key="#F75270" placeholder="#F75270" /></div>
  <div class="row"><div class="color" style="background:#F7CAC9"></div><input data-key="#F7CAC9" placeholder="#F7CAC9" /></div>
  <div class="row"><div class="color" style="background:#DD7BDF"></div><input data-key="#DD7BDF" placeholder="#DD7BDF" /></div>
  <div class="row"><div class="color" style="background:#FF653F"></div><input data-key="#FF653F" placeholder="#FF653F" /></div>
  <div class="row"><div class="color" style="background:#FFA02E"></div><input data-key="#FFA02E" placeholder="#FFA02E" /></div>
  <div class="row"><div class="color" style="background:#FFC81E"></div><input data-key="#FFC81E" placeholder="#FFC81E" /></div>
  <div class="row"><div class="color" style="background:#FFD6A6"></div><input data-key="#FFD6A6" placeholder="#FFD6A6" /></div>
  <div class="row"><div class="color" style="background:#4300FF"></div><input data-key="#4300FF" placeholder="#4300FF" /></div>
  <div class="row"><div class="color" style="background:#0065F8"></div><input data-key="#0065F8" placeholder="#0065F8" /></div>
</div>

<!-- PAGE 2 -->
<div id="p2" class="page">
  <div class="row"><div class="color" style="background:#00CAFF"></div><input data-key="#00CAFF" placeholder="#00CAFF" /></div>
  <div class="row"><div class="color" style="background:#00FFDE"></div><input data-key="#00FFDE" placeholder="#00FFDE" /></div>
  <div class="row"><div class="color" style="background:#1F6F5F"></div><input data-key="#1F6F5F" placeholder="#1F6F5F" /></div>
  <div class="row"><div class="color" style="background:#2FA084"></div><input data-key="#2FA084" placeholder="#2FA084" /></div>
  <div class="row"><div class="color" style="background:#6FCF97"></div><input data-key="#6FCF97" placeholder="#6FCF97" /></div>
  <div class="row"><div class="color" style="background:#9AD872"></div><input data-key="#9AD872" placeholder="#9AD872" /></div>
  <div class="row"><div class="color" style="background:#091413"></div><input data-key="#091413" placeholder="#091413" /></div>
  <div class="row"><div class="color" style="background:#854836"></div><input data-key="#854836" placeholder="#854836" /></div>
  <div class="row"><div class="color" style="background:#758A93"></div><input data-key="#758A93" placeholder="#758A93" /></div>
  <div class="row"><div class="color" style="background:#BFC9D1"></div><input data-key="#BFC9D1" placeholder="#BFC9D1" /></div>
</div>

<script>
let currentPage = 1;

function show(dir){
  document.getElementById("p"+currentPage).classList.remove("active");
  currentPage += dir;
  if(currentPage < 1) currentPage = 2;
  if(currentPage > 2) currentPage = 1;
  document.getElementById("p"+currentPage).classList.add("active");
}

function load(){
  document.querySelectorAll("input").forEach(input => {
    const key = input.dataset.key;
    const saved = localStorage.getItem(key);
    if(saved !== null) input.value = saved;
  });
}

function bindSave(){
  document.querySelectorAll("input").forEach(input => {
    input.addEventListener("input", (e) => {
      localStorage.setItem(e.target.dataset.key, e.target.value);
    });
  });
}

load();
bindSave();
</script>

</body>
</html>
